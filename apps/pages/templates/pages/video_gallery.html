{% extends "base/base.html" %}
{% load static %}

{% block title %}
Video Gallery
{% endblock %}

{% block page_css %}
<style>

.video-gallery-page{
    padding:40px 4%;
    margin: 8px;
}

.gallery-title{
    text-align:center;
    margin-bottom:40px;
}

.gallery-title span{
    display:inline-block;

    padding:10px 18px;

    border-radius:30px;

    background:rgba(212,175,55,.12);

    color:#c59b43;

    font-size:13px;

    font-weight:700;

    letter-spacing:1px;

    margin-bottom:14px;
}

.gallery-title h1{
    font-size:48px;

    color:#111;

    margin:0;

    font-family:
        'Playfair Display',
        serif;
}

.video-grid{
    display:grid;

    grid-template-columns:
        repeat(3,1fr);

    gap:28px;
}

.video-card{
    background:#fff;

    border-radius:20px;

    overflow:hidden;

    border:1px solid #eee;

    box-shadow:
        0 10px 30px rgba(0,0,0,.06);
}

.video-frame{
    position:relative;

    width:100%;

    padding-top:56.25%;
}

.video-frame iframe{
    position:absolute;

    top:0;
    left:0;

    width:100%;
    height:100%;

    border:none;
}

.video-content{
    padding:18px;
}

.video-content h3{
    margin:0;

    font-size:20px;

    color:#111;

    line-height:1.4;
}

@media(max-width:992px){

    .video-grid{
        grid-template-columns:
            repeat(2,1fr);
    }

}

@media(max-width:768px){

    .video-gallery-page{
        padding:25px 12px;
    }

    .gallery-title h1{
        font-size:34px;
    }

    .video-grid{
        grid-template-columns:1fr;
    }

}

</style>
{% endblock %}

{% block content %}
<div class="cart_border">

<section class="video-gallery-page">

    <div class="gallery-title">

        <span>
            VIDEO GALLERY
        </span>

        <h1>
            Our Video Collection
        </h1>

    </div>

    <div class="video-grid">

        {% for video in videos %}

        <div class="video-card">

            <div class="video-frame">
                <iframe width="560" height="315" src="{{ video.youtube_embed_url }}" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
            </div>

            <div class="video-content">

                <h3>
                    {{ video.title }}
                </h3>

            </div>

        </div>

        {% empty %}

        <h2>
            No Videos Found
        </h2>

        {% endfor %}

    </div>

</section>

</div>
{% endblock %}
