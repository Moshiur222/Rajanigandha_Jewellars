{% extends 'base/base.html' %}
{% load static %}
{% block content %}

<section class="auth-page">
    <div class="auth-card">
        <div class="auth-header">
            <a href="/" class="auth-logo">
                <img src="{% static 'images/logo/logo.png' %}" alt="Rajanigandha Jewellers Logo" class="auth-logo-img">
            </a>
        </div>

        <form method="POST" class="auth-form" id="signupForm">
            {% csrf_token %}

            <div class="input-group">
                <label for="name">Full Name</label>
                <div class="input-wrapper">
                    <i class="fas fa-user"></i>
                    <input 
                        type="text" 
                        id="name"
                        name="name" 
                        placeholder="Enter your full name"
                        required
                        autocomplete="name"
                    >
                </div>
            </div>

            <div class="input-group">
                <label for="email">Email Address</label>
                <div class="input-wrapper">
                    <i class="fas fa-envelope"></i>
                    <input 
                        type="email" 
                        id="email"
                        name="email" 
                        placeholder="Enter your email"
                        required
                        autocomplete="email"
                    >
                </div>
            </div>

            <div class="input-group">
                <label for="password">Password</label>
                <div class="input-wrapper">
                    <i class="fas fa-lock"></i>
                    <input 
                        type="password" 
                        id="password"
                        name="password" 
                        placeholder="Create a password"
                        required
                        autocomplete="new-password"
                    >
                </div>
            </div>

            <div class="input-group">
                <label for="confirmPassword">Confirm Password</label>
                <div class="input-wrapper">
                    <i class="fas fa-lock"></i>
                    <input 
                        type="password" 
                        id="confirmPassword"
                        name="confirm_password" 
                        placeholder="Confirm your password"
                        required
                        autocomplete="new-password"
                    >
                </div>
            </div>

            <button type="submit" class="gold-btn full" id="signupBtn">
                <span class="btn-text">Create Account</span>
                <span class="btn-spinner"></span>
            </button>

            <div class="auth-divider">
                <span>or sign up with</span>
            </div>

            <div class="social-login">
                <button type="button" class="social-btn">
                    <i class="fab fa-google"></i>
                </button>
                <button type="button" class="social-btn">
                    <i class="fab fa-facebook-f"></i>
                </button>
                <button type="button" class="social-btn">
                    <i class="fab fa-apple"></i>
                </button>
            </div>
        </form>

        <div class="auth-footer">
            <p>
                Already have an account?
                <a href="{% url 'pages:login' %}">
                    Login
                    <i class="fas fa-arrow-right"></i>
                </a>
            </p>
        </div>
    </div>

    <div class="auth-decoration">
        <div class="auth-shape auth-shape-1"></div>
        <div class="auth-shape auth-shape-2"></div>
        <div class="auth-shape auth-shape-3"></div>
    </div>
</section>

{% endblock %}

{% block page_css %}
<style>
    /* ============ AUTH PAGE STYLES ============ */
    .auth-logo{
        display:flex;
        align-items:center;
        gap:14px;
        text-decoration:none;
    }

    .auth-logo-img{
        width:600px;
        height:90px;
        object-fit:contain;
        border-radius:12px;
    }

    .auth-logo-text{
        display:flex;
        flex-direction:column;
        line-height:1.1;
    }

    .brand-name{
        font-size:28px;
        font-weight:700;
        color:#c59b43;
        letter-spacing:0.5px;
    }

    .brand-sub{
        font-size:14px;
        font-weight:500;
        color:#666;
        letter-spacing:4px;
        text-transform:uppercase;
    }
    .auth-page {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 40px 20px;
        position: relative;
        overflow: hidden;
    }

    /* Decorative Background Shapes */
    .auth-decoration {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 0;
    }

    .auth-shape {
        position: absolute;
        border-radius: 50%;
        opacity: 0.08;
        background: linear-gradient(135deg, var(--gold), var(--gold-dark));
    }

    .auth-shape-1 {
        width: 600px;
        height: 600px;
        top: -250px;
        right: -200px;
        animation: floatShape 20s ease-in-out infinite;
    }

    .auth-shape-2 {
        width: 400px;
        height: 400px;
        bottom: -150px;
        left: -100px;
        animation: floatShape 15s ease-in-out infinite reverse;
    }

    .auth-shape-3 {
        width: 300px;
        height: 300px;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        opacity: 0.03;
        animation: pulseShape 8s ease-in-out infinite;
    }

    @keyframes floatShape {
        0%, 100% { transform: translate(0, 0) rotate(0deg); }
        33% { transform: translate(30px, -30px) rotate(5deg); }
        66% { transform: translate(-20px, 20px) rotate(-3deg); }
    }

    @keyframes pulseShape {
        0%, 100% { transform: translate(-50%, -50%) scale(1); }
        50% { transform: translate(-50%, -50%) scale(1.2); }
    }

    /* Auth Card */
    .auth-card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 24px;
        padding: 48px 40px;
        width: 100%;
        max-width: 460px;
        position: relative;
        z-index: 1;
        box-shadow: var(--shadow);
        animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes slideUp {
        from {
            opacity: 0;
            transform: translateY(30px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    /* Auth Header */
    .auth-header {
        text-align: center;
        margin-bottom: 36px;
    }

    .auth-logo {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        font-family: 'Playfair Display', serif;
        font-size: 28px;
        font-weight: 800;
        color: var(--text);
        margin-bottom: 28px;
        text-decoration: none;
        transition: opacity 0.3s;
    }

    .auth-logo:hover {
        opacity: 0.8;
    }

    .logo-icon {
        color: var(--gold);
        font-size: 32px;
    }

    .auth-header h2 {
        font-family: 'Playfair Display', serif;
        font-size: 32px;
        font-weight: 700;
        color: var(--text);
        margin: 0 0 8px 0;
        letter-spacing: -0.5px;
    }

    .auth-header p {
        color: var(--muted);
        font-size: 15px;
        margin: 0;
        line-height: 1.6;
    }

    /* Form Styles */
    .auth-form {
        display: flex;
        flex-direction: column;
        gap: 20px;
    }

    .input-group {
        display: flex;
        flex-direction: column;
        gap: 8px;
    }

    .input-group label {
        font-size: 14px;
        font-weight: 600;
        color: var(--text);
        letter-spacing: 0.3px;
    }

    .input-wrapper {
        position: relative;
        display: flex;
        align-items: center;
    }

    .input-wrapper i:first-child {
        position: absolute;
        left: 16px;
        color: var(--muted);
        font-size: 16px;
        pointer-events: none;
        transition: color 0.3s;
    }

    .input-wrapper input {
        width: 100%;
        padding: 14px 16px 14px 46px;
        border: 1px solid var(--border);
        background: var(--bg);
        color: var(--text);
        border-radius: 12px;
        font-size: 15px;
        outline: none;
        transition: all 0.3s ease;
        font-family: 'Poppins', sans-serif;
    }

    .input-wrapper input:focus {
        border-color: var(--gold);
        box-shadow: 0 0 0 3px rgba(197, 155, 67, 0.1);
    }

    .input-wrapper input:focus ~ i:first-child,
    .input-wrapper input:focus + i:first-child {
        color: var(--gold);
    }

    .input-wrapper input::placeholder {
        color: var(--muted);
        opacity: 0.7;
    }

    .toggle-password {
        position: absolute;
        right: 14px;
        background: none;
        border: none;
        color: var(--muted);
        cursor: pointer;
        padding: 4px;
        font-size: 16px;
        transition: color 0.3s;
        display: flex;
        align-items: center;
    }

    .toggle-password:hover {
        color: var(--text);
    }

    /* Auth Options */
    .auth-options {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-top: -4px;
    }

    .remember-me {
        display: flex;
        align-items: flex-start;
        gap: 8px;
        cursor: pointer;
        font-size: 14px;
        color: var(--muted);
        user-select: none;
        position: relative;
    }

    .remember-me input[type="checkbox"] {
        display: none;
    }

    .checkmark {
        width: 18px;
        height: 18px;
        border: 2px solid var(--border);
        border-radius: 5px;
        display: inline-block;
        position: relative;
        transition: all 0.3s;
        flex-shrink: 0;
        margin-top: 2px;
    }

    .remember-me input:checked + .checkmark {
        background: var(--gold);
        border-color: var(--gold);
    }

    .remember-me input:checked + .checkmark::after {
        content: '';
        position: absolute;
        left: 4px;
        top: 1px;
        width: 6px;
        height: 10px;
        border: solid #fff;
        border-width: 0 2px 2px 0;
        transform: rotate(45deg);
    }

    .terms-link {
        color: var(--gold);
        font-weight: 500;
        text-decoration: none;
    }

    .terms-link:hover {
        text-decoration: underline;
    }

    /* Submit Button */
    .auth-form .gold-btn {
        margin-top: 4px;
        padding: 15px 24px;
        font-size: 16px;
        position: relative;
        overflow: hidden;
    }

    .btn-spinner {
        display: none;
        width: 20px;
        height: 20px;
        border: 2px solid rgba(255, 255, 255, 0.3);
        border-top-color: #fff;
        border-radius: 50%;
        animation: spin 0.6s linear infinite;
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
    }

    .gold-btn.loading .btn-text {
        visibility: hidden;
    }

    .gold-btn.loading .btn-spinner {
        display: block;
    }

    @keyframes spin {
        to { transform: translate(-50%, -50%) rotate(360deg); }
    }

    /* Divider */
    .auth-divider {
        display: flex;
        align-items: center;
        gap: 16px;
        margin: 8px 0;
    }

    .auth-divider::before,
    .auth-divider::after {
        content: '';
        flex: 1;
        height: 1px;
        background: var(--border);
    }

    .auth-divider span {
        font-size: 13px;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 1px;
        white-space: nowrap;
    }

    /* Social Login */
    .social-login {
        display: flex;
        gap: 12px;
        justify-content: center;
    }

    .social-btn {
        width: 48px;
        height: 48px;
        border-radius: 12px;
        border: 1px solid var(--border);
        background: var(--bg);
        color: var(--text);
        font-size: 18px;
        cursor: pointer;
        transition: all 0.3s;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .social-btn:hover {
        border-color: var(--gold);
        color: var(--gold);
        transform: translateY(-2px);
        box-shadow: var(--shadow);
    }

    /* Auth Footer */
    .auth-footer {
        text-align: center;
        margin-top: 32px;
        padding-top: 24px;
        border-top: 1px solid var(--border);
    }

    .auth-footer p {
        color: var(--muted);
        font-size: 15px;
        margin: 0;
    }

    .auth-footer a {
        color: var(--gold);
        font-weight: 600;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        gap: 6px;
        transition: all 0.3s;
    }

    .auth-footer a:hover {
        color: var(--gold-dark);
        gap: 10px;
    }

    .auth-footer a i {
        font-size: 12px;
        transition: transform 0.3s;
    }

    .auth-footer a:hover i {
        transform: translateX(3px);
    }

    /* Error States */
    .input-wrapper.error input {
        border-color: #dc3545;
    }

    .input-wrapper.success input {
        border-color: #059669;
    }

    .error-message {
        color: #dc3545;
        font-size: 12px;
        margin-top: 4px;
        display: none;
    }

    .input-wrapper.error + .error-message {
        display: block;
    }

    /* Password Strength Indicator */
    .password-strength {
        margin-top: 8px;
    }

    .strength-bar {
        height: 4px;
        border-radius: 2px;
        background: var(--border);
        transition: all 0.3s;
        margin-top: 6px;
    }

    .strength-bar.weak {
        background: #dc3545;
        width: 33%;
    }

    .strength-bar.medium {
        background: #f59e0b;
        width: 66%;
    }

    .strength-bar.strong {
        background: #059669;
        width: 100%;
    }

    .strength-text {
        font-size: 12px;
        margin-top: 4px;
    }

    .strength-text.weak { color: #dc3545; }
    .strength-text.medium { color: #f59e0b; }
    .strength-text.strong { color: #059669; }

    /* Toast Notification */
    .auth-toast {
        position: fixed;
        top: 24px;
        right: 24px;
        padding: 16px 24px;
        border-radius: 12px;
        color: #fff;
        font-weight: 500;
        z-index: 10000;
        transform: translateX(120%);
        transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        display: flex;
        align-items: center;
        gap: 10px;
    }

    .auth-toast.show {
        transform: translateX(0);
    }

    .auth-toast.success {
        background: #059669;
    }

    .auth-toast.error {
        background: #dc3545;
    }

    /* Responsive */
    @media (max-width: 576px) {
        .auth-card {
            padding: 32px 24px;
            border-radius: 20px;
        }

        .auth-header h2 {
            font-size: 26px;
        }

        .auth-logo {
            font-size: 24px;
        }

        .social-login {
            gap: 10px;
        }

        .social-btn {
            width: 44px;
            height: 44px;
        }
    }
</style>
{% endblock %}

{% block extra_js %}
<script>
    function togglePassword() {
        const passwordInput = document.getElementById('password');
        const toggleBtn = document.querySelector('.toggle-password i');
        
        if (passwordInput.type === 'password') {
            passwordInput.type = 'text';
            toggleBtn.classList.remove('fa-eye');
            toggleBtn.classList.add('fa-eye-slash');
        } else {
            passwordInput.type = 'password';
            toggleBtn.classList.remove('fa-eye-slash');
            toggleBtn.classList.add('fa-eye');
        }
    }

    // Password strength checker
    const passwordInput = document.getElementById('password');
    const strengthBar = document.createElement('div');
    strengthBar.className = 'strength-bar';
    const strengthText = document.createElement('div');
    strengthText.className = 'strength-text';
    
    const passwordStrengthDiv = document.createElement('div');
    passwordStrengthDiv.className = 'password-strength';
    passwordStrengthDiv.appendChild(strengthBar);
    passwordStrengthDiv.appendChild(strengthText);
    
    passwordInput.parentElement.parentElement.appendChild(passwordStrengthDiv);

    passwordInput.addEventListener('input', function() {
        const password = this.value;
        let strength = 0;
        
        if (password.length >= 8) strength++;
        if (password.match(/[a-z]/) && password.match(/[A-Z]/)) strength++;
        if (password.match(/\d/)) strength++;
        if (password.match(/[^a-zA-Z\d]/)) strength++;
        
        strengthBar.className = 'strength-bar';
        strengthText.className = 'strength-text';
        
        if (password.length === 0) {
            strengthBar.className = 'strength-bar';
            strengthText.textContent = '';
        } else if (strength <= 1) {
            strengthBar.classList.add('weak');
            strengthText.classList.add('weak');
            strengthText.textContent = 'Weak password';
        } else if (strength === 2 || strength === 3) {
            strengthBar.classList.add('medium');
            strengthText.classList.add('medium');
            strengthText.textContent = 'Medium password';
        } else {
            strengthBar.classList.add('strong');
            strengthText.classList.add('strong');
            strengthText.textContent = 'Strong password';
        }
    });

    // Confirm password validation
    const confirmPasswordInput = document.getElementById('confirmPassword');
    
    confirmPasswordInput.addEventListener('input', function() {
        const password = passwordInput.value;
        const confirmPassword = this.value;
        const wrapper = this.closest('.input-wrapper');
        
        if (confirmPassword.length === 0) {
            wrapper.classList.remove('error', 'success');
        } else if (password === confirmPassword) {
            wrapper.classList.remove('error');
            wrapper.classList.add('success');
        } else {
            wrapper.classList.remove('success');
            wrapper.classList.add('error');
        }
    });

    // Form submission
    document.getElementById('signupForm').addEventListener('submit', function(e) {
        const password = passwordInput.value;
        const confirmPassword = confirmPasswordInput.value;
        const termsChecked = document.querySelector('input[name="terms"]').checked;
        
        if (password !== confirmPassword) {
            e.preventDefault();
            showAuthToast('Passwords do not match', 'error');
            return;
        }
        
        if (!termsChecked) {
            e.preventDefault();
            showAuthToast('Please agree to the Terms & Conditions', 'error');
            return;
        }
        
        const btn = document.getElementById('signupBtn');
        btn.classList.add('loading');
    });

    // Show toast function
    function showAuthToast(message, type = 'success') {
        const toast = document.createElement('div');
        toast.className = `auth-toast ${type}`;
        toast.innerHTML = `
            <i class="fas fa-${type === 'success' ? 'check-circle' : 'exclamation-circle'}"></i>
            ${message}
        `;
        document.body.appendChild(toast);
        
        setTimeout(() => toast.classList.add('show'), 100);
        
        setTimeout(() => {
            toast.classList.remove('show');
            setTimeout(() => toast.remove(), 400);
        }, 3000);
    }

    // Display Django messages if any
    {% if messages %}
        {% for message in messages %}
            showAuthToast('{{ message|escapejs }}', '{{ message.tags }}');
        {% endfor %}
    {% endif %}
</script>
{% endblock %}
