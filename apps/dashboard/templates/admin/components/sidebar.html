 <aside class="sidebar" id="sidebar">
            <div class="sidebar-brand">
                <div class="brand-icon">
                    <i class="fas fa-bolt"></i>
                </div>
                <span class="brand-text">Admin</span>
            </div>
            
            <nav class="sidebar-menu">
                <ul class="menu-list">

                    {% with active_url=request.resolver_match.url_name %}

                    <li class="menu-item has-dropdown {% if active_url == 'mission' or active_url == 'vision' or active_url == 'photo_album' or active_url == 'photo_gallery' or active_url == 'video_gallery' %}open active{% endif %}">

                        <!-- DROPDOWN BUTTON -->

                        <a href="javascript:void(0)"
                        class="menu-link dropdown-toggle">

                            <i class="fas fa-building"></i>

                            <span>
                                About Us
                            </span>

                            <i class="fas fa-angle-down dropdown-arrow"></i>

                        </a>

                        <!-- DROPDOWN MENU -->

                        <ul class="submenu">

                            <li class="{% if active_url == 'mission' %}active{% endif %}">
                                <a href="{% url 'dashboard:mission' %}">
                                    <i class="fas fa-bullseye"></i>
                                    <span>Our Mission</span>
                                </a>
                            </li>

                            <li class="{% if active_url == 'vision' %}active{% endif %}">
                                <a href="{% url 'dashboard:vision' %}">
                                    <i class="fas fa-eye"></i>
                                    <span>Our Vision</span>
                                </a>
                            </li>

                            <li class="{% if active_url == 'photo_album' %}active{% endif %}">
                                <a href="{% url 'dashboard:photo_album' %}">
                                    <i class="fas fa-images"></i>
                                    <span>Photo Album</span>
                                </a>
                            </li>

                            <li class="{% if active_url == 'video_gallery' %}active{% endif %}">
                                <a href="{% url 'dashboard:video_gallery' %}">
                                    <i class="fas fa-video"></i>
                                    <span>Video Gallery</span>
                                </a>
                            </li>

                        </ul>

                    </li>

                    {% endwith %}
                    <li class="menu-item">
                        <a href="{% url 'dashboard:menue' %}" class="menu-link">
                            <i class="fas fa-bars"></i>
                            <span>Menue</span>
                        </a>
                    </li>

                    <li class="menu-item">
                        <a href="{% url 'dashboard:category' %}" class="menu-link">
                            <i class="fas fa-layer-group"></i>
                            <span>Category</span>
                        </a>
                    </li>

                    <li class="menu-item">
                        <a href="{% url 'dashboard:sub_category' %}" class="menu-link">
                            <i class="fas fa-list"></i>
                            <span>Sub Category</span>
                        </a>
                    </li>

                    <li class="menu-item">
                        <a href="{% url 'dashboard:products' %}" class="menu-link">
                            <i class="fas fa-gem"></i>
                            <span>Products</span>
                        </a>
                    </li>

                    <li class="menu-item">
                        <a href="{% url 'dashboard:orders' %}" class="menu-link">
                            <i class="fas fa-shopping-bag"></i>
                            <span>Orders</span>
                        </a>
                    </li>

                    <li class="menu-item">
                        <a href="{% url 'dashboard:customers' %}" class="menu-link">
                            <i class="fas fa-users"></i>
                            <span>Customers</span>
                        </a>
                    </li>

                    <li class="menu-item">
                        <a href="{% url 'dashboard:offers' %}" class="menu-link">
                            <i class="fas fa-tags"></i>
                            <span>Offers</span>
                        </a>
                    </li>

                    <li class="menu-item">
                        <a href="{% url 'dashboard:stores' %}" class="menu-link">
                            <i class="fas fa-store"></i>
                            <span>Stores</span>
                        </a>
                    </li>

                </ul>
            </nav>
        </aside>
